  #   - LE_y: y-coordinate of leading edge
  #   - LE_z: z-coordinate of leading edge
  #   - TE_x: x-coordinate of trailing edge
  #   - TE_y: y-coordinate of trailing edge
  #   - TE_z: z-coordinate of trailing edge
