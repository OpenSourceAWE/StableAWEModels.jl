    - [76, 21, 38, BRIDLE, 6.909, 2.0,  dyneema, nothing, 0.01]  # br6 second half (pulley)#TODO: was 7.086
    
    # Bridle convergence - right side (non-compressive, using dyneema)
    - [77, 28, 32, BRIDLE, 2.045, 2.0,  dyneema, nothing, 0.01]  # BRII
    - [78, 29, 32, BRIDLE, 2.333, 2.0,  dyneema, nothing, 0.01]  # BRI
