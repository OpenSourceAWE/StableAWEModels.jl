#      - stiffness is auto-calculated: k = E*A/l0
#   2. Explicit stiffness: [id, point_i, point_j, type, l0, diameter_mm, axial_stiffness, compression_frac]
#      - axial_stiffness is a number (e.g., 2000.0)
#      - axial_damping defaults to 0.0
