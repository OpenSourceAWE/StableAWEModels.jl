# 2-plate kite aero geometry
# Must match structural geometry in particle_structural_geometry.yaml
# 3 sections with LE/TE pairs: le_left/te_left, le_center/te_center, le_right/te_right

wing_sections:
  # headers: [airfoil_id, LE_x, LE_y, LE_z, TE_x, TE_y, TE_z]
  headers: [airfoil_id, LE_x, LE_y, LE_z, TE_x, TE_y, TE_z]
  data:
    # Left section: le_left (LE) and te_left (TE)
    - [1, -0.5, 1.0, 2.0, 0.5, 1.0, 2.2]

    # Center section: le_center (LE) and te_center (TE)
    - [1, -0.5, 0.0, 2.5, 0.5, 0.0, 2.7]

    # Right section: le_right (LE) and te_right (TE)
    - [1, -0.5, -1.0, 2.0, 0.5, -1.0, 2.2]

wing_airfoils:
  alpha_range: [-180, 180, 1]  # deg
  reynolds: 1e6
  headers: [airfoil_id, type, info_dict]
  data:
    - [1, polars, {csv_file_path: "polars/1.csv"}]
