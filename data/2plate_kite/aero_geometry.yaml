# Symmetric kite aero geometry

wing_sections:
  # headers: [airfoil_id, LE_x, LE_y, LE_z, TE_x, TE_y, TE_z]
  headers: [airfoil_id, LE_x, LE_y, LE_z, TE_x, TE_y, TE_z]
  data:
    # Right tip chord (as in structure)
    - [1, -2.52658787,  3.90998347,  8.63399119,  -0.56907534,  3.88818007,  8.98058423]

    # Left tip chord = mirror of right (y → -y), same x,z
    - [1, -2.52658787, -3.90998347,  8.63399119,  -0.56907534, -3.88818007,  8.98058423]

    # Center chord exactly on centerline
    - [1, -3.10388086,  0.0,         11.66322754, -1.14745968,  0.0,         12.00319579]

wing_airfoils:
  alpha_range: [-180, 180, 1]  # deg
  reynolds: 1e6
  headers: [airfoil_id, type, info_dict]
  data:
    - [1, polars, {csv_file_path: "polars/1.csv"}]
