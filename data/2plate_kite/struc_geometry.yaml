##############################
## General ###################
##############################
bridle_point_node: [0.0, 0.0, 0.0]  # [x,y,z] — ground/fixed node

## Mass
pulley_mass: 0.1    # [kg]
kcu_mass: 8.4       # [kg]

## Material properties
dyneema:
  density: 724.0                # [kg/m³]
  youngs_modulus: !!float 5.5e10  # [Pa]
  damping_per_stiffness: 0.0    # [/s] → c = damping_per_stiffness * k

fixed_point_indices: [0]  # node indices fixed in space (0-based indexing)

###########################
## Wing ###################
###########################

wing_particles:
  # id, x [m], y [m], z [m]
  headers: [id, x, y, z]
  data:
    # Right chord (kept from your right side)
    - [1, -2.52658787,  3.90998347,  8.63399119]   # LE_right
    - [2, -0.56907534,  3.88818007,  8.98058423]   # TE_right

    # Center/apex chord placed exactly on centerline
    - [3, -3.10388086,  0.0,         11.66322754]  # LE_center (apex)
    - [4, -1.14745968,  0.0,         12.00319579]  # TE_center (apex)

    # Left chord = mirror of right (y → -y), same x,z
    - [5, -2.52658787, -3.90998347,  8.63399119]   # LE_left (mirrored)
    - [6, -0.56907534, -3.88818007,  8.98058423]   # TE_left (mirrored)

wing_connections:
  # name, ci, cj (node indices, 0-based)
  headers: [name, ci, cj]
  data:
    # Chordwise struts (3 ribs)
    - [strut_right,  1, 2]
    - [strut_center, 3, 4]
    - [strut_left,   5, 6]

    # Leading-edge spar (center to tips)
    - [le_right, 1, 3]
    - [le_left,  3, 5]

    # Trailing-edge wire (center to tips)
    - [te_right, 2, 4]
    - [te_left,  4, 6]

    # Cross-bracing diagonals (right panel)
    - [diag_right_a, 1, 4]
    - [diag_right_b, 2, 3]

    # Cross-bracing diagonals (left panel)
    - [diag_left_a, 3, 6]
    - [diag_left_b, 4, 5]

wing_elements:
  # name, l0 [m], k [N/m], c [N·s/m], m [kg], linktype
  headers: [name, l0, k, c, m, linktype]
  data:
    # Keep symmetric left/right stiffness and rest lengths
    # Chordwise struts (~2 m chord)
    - [strut_right,  2.0,   2000.0, 0.0, 1.0, "default"]
    - [strut_center, 2.0,   2000.0, 0.0, 1.0, "default"]
    - [strut_left,   2.0,   2000.0, 0.0, 1.0, "default"]

    # Leading-edge spar (center↔tips) — matched left/right
    - [le_right, 5.00, 2000.0, 0.0, 1.0, "default"]
    - [le_left,  5.00, 2000.0, 0.0, 1.0, "default"]

    # Trailing-edge wire (center↔tips) — matched left/right
    - [te_right, 5.00, 1000.0, 0.0, 0.2, "default"]
    - [te_left,  5.00, 1000.0, 0.0, 0.2, "default"]

    # Cross-bracing diagonals — matched left/right
    - [diag_right_a, 5.30, 1000.0, 0.0, 0.1, "default"]
    - [diag_right_b, 5.30, 1000.0, 0.0, 0.1, "default"]
    - [diag_left_a,  5.30, 1000.0, 0.0, 0.1, "default"]
    - [diag_left_b,  5.30, 1000.0, 0.0, 0.1, "default"]

#############################
## Bridle ###################
#############################

bridle_particles:
  headers: [id, x, y, z]
  data: []  # none

bridle_connections:
  # name, ci, cj
  headers: [name, ci, cj]
  data:
    # Ground (0) to all wing nodes
    - [bridle_right_le,  0, 1]
    - [bridle_right_te,  0, 2]
    - [bridle_center_le, 0, 3]
    - [Power Tape,       0, 4]
    - [bridle_left_le,   0, 5]
    - [bridle_left_te,   0, 6]

bridle_elements:
  # name, l0 [m], d [m], material, linktype
  headers: [name, l0, d, material, linktype]
  data:
    # Use equal left/right rest lengths to avoid lateral pre-bias.
    - [bridle_right_le,  9.80, 0.0025, dyneema, "noncompressive"]
    - [bridle_right_te,  9.80, 0.0025, dyneema, "noncompressive"]
    - [bridle_center_le, 12.0, 0.0025, dyneema, "noncompressive"]
    - [Power Tape,       12.0, 0.0025, dyneema, "noncompressive"]
    - [bridle_left_le,   9.80, 0.0025, dyneema, "noncompressive"]
    - [bridle_left_te,   9.80, 0.0025, dyneema, "noncompressive"]
