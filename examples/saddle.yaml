# saddle.yaml
one_based: true        # keep true so i/j match Julia directly
name: "saddle_form_v1" # optional metadata
units: "SI"            # optional

params:                # optional, anything you want to carry along
  n: 41
  k_t: 1
  c: 1
  L: 10
  m_block: 100
  rho_tether: 0.1
  dt: 0.1
  t_steps: 1000
  abs_tol: 1e-50
  rel_tol: 1e-05
  max_iter: 100000.0
  g: 9.807
  v_w: [5, 0, 0]
  rho: 1.225
  c_d_bridle: 1.05
  d_bridle: 0.02
  l0: 0
  m_segment: 1
  k: 9

# Nodes are in order; the order is the index (1..N)
