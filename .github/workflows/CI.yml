name: CI
on:
  workflow_dispatch:
  repository_dispatch:
    types: [auto-pr-created]
  push:
    branches:
      - main
    tags: '*'
  pull_request:

concurrency:
  # Group runs by the workflow name and the branch or tag name
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reuse-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run REUSE lint
        run: docker run --rm --volume ${{ github.workspace }}:/data fsfe/reuse lint

  test-with-code-coverage:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1'      # Latest stable release
          - 'lts'    # Long-term support release
        os:
          - ubuntu-latest
          - windows-latest
        arch:
          - x64
        include:
          - os: macOS-latest
            arch: aarch64
            version: '1'
    steps:
      - uses: actions/checkout@v5

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}

      - name: Detect Julia version
        id: detect_version
        run: |
          JULIA_VERSION=$(julia --version | cut -d' ' -f3 | cut -d'.' -f1,2)
          echo "version=$JULIA_VERSION" >> $GITHUB_OUTPUT
          echo "Detected Julia version: $JULIA_VERSION"

      - name: Copy default Manifest files
        run: cp Manifest-v${{ steps.detect_version.outputs.version }}.toml.default Manifest.toml || echo "No default available for version ${{ steps.detect_version.outputs.version }}"

      - name: Install matplotlib
        if: runner.os == 'Linux'
        run: sudo apt-get install -y python3-matplotlib

      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1

      - name: Build PyCall
        run: julia --project -e 'ENV["SAM_PRECOMPILE"]="false"; ENV["PYTHON"]=""; using Pkg; Pkg.instantiate(); Pkg.add("PyCall"); Pkg.build("PyCall")'

      - uses: julia-actions/julia-runtest@v1

      - name: Upload PNG plots as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-plots-${{ matrix.os }}-julia${{ matrix.version }}-${{ matrix.arch }}
          path: data/*.png
          if-no-files-found: ignore
          retention-days: 7

      - uses: julia-actions/julia-processcoverage@v1

      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
        continue-on-error: true

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - name: Install matplotlib
        run: sudo apt-get install -y python3-matplotlib

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'

      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1

      - name: Build PyCall
        run: julia --project=docs/ -e 'ENV["SAM_PRECOMPILE"]="false"; ENV["PYTHON"]=""; using Pkg; Pkg.instantiate(); Pkg.add("PyCall"); Pkg.build("PyCall")'

      - uses: julia-actions/julia-docdeploy@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}

      - name: Run doctests
        run: |
          julia --project=docs -e '
            using Documenter: DocMeta, doctest
            using KiteUtils
            DocMeta.setdocmeta!(KiteUtils, :DocTestSetup, :(using KiteUtils); recursive=true)
            doctest(KiteUtils)'
