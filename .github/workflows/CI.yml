name: CI
on:
  workflow_dispatch:
  repository_dispatch:
    types: [auto-pr-created]
  push:
    branches:
      - main
    tags: '*'
  pull_request:

concurrency:
  # Group runs by the workflow name and the branch or tag name
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reuse-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.client_payload.ref || github.head_ref || github.ref }}
          
      - name: Run REUSE lint
        run: |
          docker run --rm --volume ${{ github.workspace }}:/data fsfe/reuse lint

  test-with-code-coverage:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'
          - '1.11'
        os:
          - ubuntu-latest
          - windows-latest
        arch:
          - x64
        include:
          - os: macOS-latest
            arch: aarch64
            version: 1.11
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.client_payload.ref || github.head_ref || github.ref }}

      - name: Copy default Manifest files
        run: |
          cp Manifest-v${{ matrix.version }}.toml.default Manifest.toml || 
                echo "No default available for Manifest-v${{ matrix.version }}.toml"
        shell: bash

      - name: Install matplotlib
        run: if [ "$RUNNER_OS" = "Linux" ]; then sudo apt-get install -y python3-matplotlib; fi
        shell: bash

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}

      - uses: julia-actions/cache@v2

      - uses: julia-actions/julia-buildpkg@v1

      - name: Build PyCall
        run: julia --project -e 'ENV["SAM_PRECOMPILE"]="false"; ENV["PYTHON"]=""; using Pkg; Pkg.instantiate(); Pkg.add("PyCall"); Pkg.build("PyCall")'
        shell: bash

      - uses: julia-actions/julia-runtest@v1

      - name: Upload PNG plots as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-plots-${{ matrix.os }}-julia${{ matrix.version }}-${{ matrix.arch }}
          path: data/*.png
          if-no-files-found: ignore
          retention-days: 7

      - uses: julia-actions/julia-processcoverage@v1

      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
        continue-on-error: true

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.client_payload.ref || github.head_ref || github.ref }}

      - name: Copy default Manifest files
        run: |
          cp Manifest-v1.11.toml.default Manifest.toml || 
                echo "No default available for Manifest-v1.11.toml"
        shell: bash
          
      - name: Install matplotlib
        run: sudo apt-get install -y python3-matplotlib
        shell: bash
        
      - uses: julia-actions/setup-julia@v2
      
      - uses: julia-actions/cache@v2

      - uses: julia-actions/julia-buildpkg@v1

      - name: Build PyCall
        run: julia --project=docs/ -e 'ENV["SAM_PRECOMPILE"]="false"; ENV["PYTHON"]=""; using Pkg; Pkg.instantiate(); Pkg.add("PyCall"); Pkg.build("PyCall")'
        shell: bash
        
      - uses: julia-actions/julia-docdeploy@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
      - run: |
          julia --project=docs -e '
            using Documenter: DocMeta, doctest
            using KiteUtils
            DocMeta.setdocmeta!(KiteUtils, :DocTestSetup, :(using KiteUtils); recursive=true)
            doctest(KiteUtils)'
