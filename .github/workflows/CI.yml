name: CI
on:
  workflow_dispatch:
  repository_dispatch:
    types: [auto-pr-created]
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:

concurrency:
  # Group runs by the workflow name and the branch or tag name
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Clone registries/packages directly from their git sources instead of the
# Julia package server, which intermittently 404s on stale registry trees.
env:
  JULIA_PKG_SERVER: ""

jobs:
  reuse-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run REUSE lint
        run: docker run --rm --volume ${{ github.workspace }}:/data fsfe/reuse lint

  test-with-code-coverage:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12'
        os:
          - ubuntu-latest
          - windows-latest
        arch:
          - x64
        include:
          - os: ubuntu-latest
            version: '1.11'
            arch: x64
            prefix: xvfb-run -a
          - os: ubuntu-latest
            version: '1.12'
            arch: x64
            prefix: xvfb-run -a

    steps:
      - uses: actions/checkout@v7

      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}

      - name: Install display dependencies for GLMakie
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgl1-mesa-dri

      - uses: julia-actions/cache@v3

      - name: Prepare version-specific manifest
        shell: bash
        run: |
          JULIA_VERSION=$(julia --version | awk '{print $3}' | cut -d'.' -f1,2)
          DEFAULT="Manifest-v${JULIA_VERSION}.toml.default"
          TARGET="Manifest-v${JULIA_VERSION}.toml"
          if [ -f "$DEFAULT" ] && [ ! -f "$TARGET" ]; then
            cp "$DEFAULT" "$TARGET"
            echo "Copied $DEFAULT to $TARGET"
          fi

      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        with:
          prefix: ${{ matrix.prefix }}

      - name: Upload PNG plots as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-plots-${{ matrix.os }}-julia${{ matrix.version }}-${{ matrix.arch }}
          path: data/*.png
          if-no-files-found: ignore
          retention-days: 7

      - uses: julia-actions/julia-processcoverage@v1

      - uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
        continue-on-error: true

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7

      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'

      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1

      - name: Install display dependencies for GLMakie
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgl1-mesa-dri

      - name: Instantiate docs project
        run: |
          julia --project=docs -e '
            using Pkg
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.instantiate()'

      - name: Generate figures
        run: >
          xvfb-run -a
          julia --project=docs docs/generate_figures.jl

      - uses: julia-actions/julia-docdeploy@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
