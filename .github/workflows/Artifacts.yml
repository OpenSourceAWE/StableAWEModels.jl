name: Create Release Assets and Update Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-assets:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Julia
      uses: julia-actions/setup-julia@v1
      with:
        version: '1.11'  # or your Julia version

    - name: Install ArtifactUtils package
      run: julia -e 'using Pkg; Pkg.add("ArtifactUtils");'

    - name: Run create_xz_files script
      run: ./bin/create_model_archive

    - name: Create GitHub Release and upload .tar.gz assets
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        files: 'data/*.tar.gz'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Generate or update Artifacts.toml
      run: julia scripts/update_artifacts.jl
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Commit and push updated Artifacts.toml
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Artifacts.toml Manifest*
        git commit -m "Update toml files for release ${{ github.ref_name }}" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
