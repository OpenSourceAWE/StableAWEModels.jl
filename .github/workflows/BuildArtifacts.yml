name: Build Tarball Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install matplotlib
      run: if [ "$RUNNER_OS" = "Linux" ]; then sudo apt-get install -y python3-matplotlib; fi
      shell: bash

    - name: Setup Julia
      uses: julia-actions/setup-julia@v1
      with:
        version: '1.11' # or your Julia version

    - name: Install ArtifactUtils package
      run: julia -e 'using Pkg; Pkg.add("ArtifactUtils");'

    - name: Run create_model_archive script
      run: ./bin/create_model_archive

    - name: Generate or update Artifacts.toml
      run: julia scripts/update_artifacts.jl
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Commit and push updated toml files
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Artifacts.toml Manifest-1.10.toml.default Manifest-1.11.toml.default
        git commit -m "Update Artifacts.toml with new artifacts" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload tar.gz artifacts
      uses: actions/upload-artifact@v4
      with:
        name: model-tarballs
        path: data/*.tar.gz
        retention-days: 7
