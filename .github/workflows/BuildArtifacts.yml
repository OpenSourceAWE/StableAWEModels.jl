# This workflow builds artifacts for multiple Julia versions concurrently
# and then creates a single pull request with the updated TOML files.
# Additionally it aggregates all built
# tarballs and uploads a single versioned artifact:
#   model-archives-<package-version>

name: Build Tarball Artifacts

on:
  push:
    branches:
      - main
    paths:
      - Project.toml
  workflow_dispatch:

concurrency:
  group: build-artifacts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect package version and whether it changed vs previous commit.
  version_check:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check_version_changed.outputs.changed }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Read current version
        id: get_version
        shell: bash
        run: |
          set -euo pipefail
          if ! grep -qE '^\s*version\s*=' Project.toml; then
            echo "Project.toml has no 'version' field"; exit 1
          fi
          ver=$(grep -E '^\s*version\s*=' Project.toml | sed -E 's/.*=\s*"([^"]+)".*/\1/')
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Detected version: $ver"

      - name: Check if version changed vs previous commit
        id: check_version_changed
        shell: bash
        run: |
          set -euo pipefail
          prev=""
          if git cat-file -e HEAD^ 2>/dev/null && git show HEAD^:Project.toml >/tmp/prev.toml 2>/dev/null; then
            prev=$(grep -E '^\s*version\s*=' /tmp/prev.toml | sed -E 's/.*=\s*"([^"]+)".*/\1/' || true)
          fi
          curr="${{ steps.get_version.outputs.version }}"
          echo "Previous version: ${prev:-<none>}"
          echo "Current version: $curr"
          if [ -n "$prev" ] && [ "$prev" = "$curr" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No version change detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version change detected."
          fi

  # This job runs in parallel for each Julia version specified in the matrix.
  build:
    needs: version_check
    if: >
      (github.event_name == 'workflow_dispatch' || needs.version_check.outputs.changed == 'true')
      && !contains(github.event.head_commit.message || '', 'update-toml-files')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        julia-version: ['1.10', '1.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install matplotlib
      run: if [ "$RUNNER_OS" = "Linux" ]; then sudo apt-get update && sudo apt-get install -y python3-matplotlib; fi
      shell: bash

    - name: Setup Julia ${{ matrix.julia-version }}
      uses: julia-actions/setup-julia@v2
      with:
        version: ${{ matrix.julia-version }}

    - name: Install ArtifactUtils package
      run: julia -e 'using Pkg; Pkg.add("ArtifactUtils");'

    # This script creates the model archives and updates the default manifest for the
    # current Julia version.
    - name: Run create_model_archive script
      run: ./bin/create_model_archive

    - name: Generate or update version-specific Artifacts.toml
      run: julia --project=. scripts/update_artifacts.jl

    # Upload the generated tarballs for this specific job.
    - name: Upload tar.gz artifacts
      uses: actions/upload-artifact@v4
      with:
        name: model-tarballs-${{ matrix.julia-version }}
        path: data/models_v${{ matrix.julia-version }}.tar.gz
        retention-days: 7

    # Upload the entire workspace to capture the generated TOML files.
    - name: Upload workspace for Julia ${{ matrix.julia-version }}
      uses: actions/upload-artifact@v4
      with:
        name: workspace-${{ matrix.julia-version }}
        path: .
        retention-days: 1

  # Aggregate all tarballs into a single versioned artifact.
  collect_archives:
    runs-on: ubuntu-latest
    needs: [version_check, build]
    if: github.event_name == 'workflow_dispatch' || needs.version_check.outputs.changed == 'true'
    steps:
      - name: Download all tarball artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: model-tarballs-*
          merge-multiple: true
          path: data

      - name: List downloaded files
        run: ls -lR

      - name: Upload combined model archives artifact (versioned)
        uses: actions/upload-artifact@v4
        with:
          name: model-archives-${{ needs.version_check.outputs.version }}
          path: |
            data/*.tar.gz
          if-no-files-found: error
          retention-days: 90

  # This job runs only after all 'build' jobs have successfully completed.
  create_pr:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || needs.version_check.outputs.changed == 'true'

    steps:
    - name: Checkout a clean version of the code
      uses: actions/checkout@v4

    # Download only the specific workspace artifacts needed.
    - name: Download workspace-1.10 artifact
      uses: actions/download-artifact@v4
      with:
        name: workspace-1.10
        path: ./artifacts/workspace-1.10

    - name: Download workspace-1.11 artifact
      uses: actions/download-artifact@v4
      with:
        name: workspace-1.11
        path: ./artifacts/workspace-1.11

    # Merge the version-specific artifact files and restore manifests.
    - name: Merge and Restore TOML files from artifacts
      run: |
        echo "Merging version-specific Artifacts.toml files..."
        # Use cat to concatenate the two files into one.
        # A blank line is added between them for readability.
        cat ./artifacts/workspace-1.10/Artifacts-v1.10.toml.default > Artifacts.toml.default
        echo "" >> Artifacts.toml.default
        cat ./artifacts/workspace-1.11/Artifacts-v1.11.toml.default >> Artifacts.toml.default
        echo "Final Artifacts.toml.default created."
        
        echo "Copying manifest files..."
        cp ./artifacts/workspace-1.10/Manifest-v1.10.toml.default ./Manifest-v1.10.toml.default
        cp ./artifacts/workspace-1.11/Manifest-v1.11.toml.default ./Manifest-v1.11.toml.default
        echo "Files restored."

    # Generate a token from the GitHub App to authorize the PR creation
    - name: Generate token
      id: generate_token
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ secrets.APP_ID }}
        private-key: ${{ secrets.PRIVATE_KEY }}

    # Create the PR using the token generated from the GitHub App
    - name: Create Pull Request with updated TOML files
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ steps.generate_token.outputs.token }}
        commit-message: "Update TOML files"
        branch: "update-toml-files"
        delete-branch: true
        title: "Update Artifacts.toml.default and default Manifests"
        body: |
          Automated update of `Artifacts.toml.default` and `Manifest*.toml.default` files.
          This PR was generated by the 'Build Tarball Artifacts' workflow.
        # Add the paths for all the files you want to include in the PR.
        add-paths: |
          Artifacts.toml.default
          Manifest-v1.10.toml.default
          Manifest-v1.11.toml.default
