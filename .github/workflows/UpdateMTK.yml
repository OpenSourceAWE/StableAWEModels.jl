name: Nightly ModelingToolkit Compat Update

on:
  # Run automatically at 2:00 AM UTC every day
  schedule:
    - cron: '0 2 * * *'
  # Allow manual runs from the Actions tab
  workflow_dispatch:

jobs:
  update-compat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1'

      - name: Get latest ModelingToolkit minor version
        id: get_version
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/SciML/ModelingToolkit.jl/releases/latest | jq -r .tag_name | sed -E 's/^v([0-9]+\.[0-9]+)\..*/\1/')
          echo "latest_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"

      - name: Read current compat version from Project.toml
        id: get_current_compat
        run: |
          CURRENT_VERSION=$(awk '/^\[compat\]/ {f=1; next} /^\[/ {f=0} f && /^ModelingToolkit/ {gsub(/[~^>=< ]/,""); split($3,a,"."); print a[1]"."a[2]}' Project.toml | head -n1)
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if update is needed
        id: check_update
        run: |
          if [ "${{ steps.get_version.outputs.latest_version }}" = "${{ steps.get_current_compat.outputs.current_version }}" ]; then
            echo "No update needed."
            exit 0
          else
            echo "Update needed: ${{ steps.get_current_compat.outputs.current_version }} -> ${{ steps.get_version.outputs.latest_version }}"
          fi

      - name: Update Project.toml compat entry
        run: |
          sed -i -E '/\[compat\]/,/\[/ s/(ModelingToolkit\s*=\s*")[^"]+/\1~${{ steps.get_version.outputs.latest_version }}/' Project.toml          

      # Generate a token from the GitHub App to authorize the PR creation
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      # Create the PR using the token generated from the GitHub App
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.generate_token.outputs.token }}
          commit-message: "chore: Update ModelingToolkit compat to ~${{ steps.get_version.outputs.latest_version }}"
          branch: "chore/update-mtk-compat"
          delete-branch: true
          title: "🤖 Compat: Update ModelingToolkit to ~${{ steps.get_version.outputs.latest_version }}"
          body: |
            This is an automated PR to update the `ModelingToolkit.jl` compatibility entry.

            **New Version:** `~${{ steps.get_version.outputs.latest_version }}`

            This ensures the package remains compatible with the latest minor release of ModelingToolkit.
