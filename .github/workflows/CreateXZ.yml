name: Update xz files

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types: [closed]

jobs:
  update-and-pr:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.pull_request && github.event.pull_request.merged == true) }}
    runs-on: ubuntu-latest

    steps:
      - name: Install matplotlib
        run: sudo apt-get install -y python3-matplotlib
        shell: bash

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Use default manifest
        run: |
          if [ -f Manifest.toml.default ]; then cp Manifest.toml.default Manifest.toml; fi
        shell: bash

      - name: Set up Julia
        uses: julia-actions/install-juliaup@v2
        with:
          channel: 'release'

      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1

      - name: Build PyCall
        run: julia --project -e 'ENV["PYTHON"]=""; using Pkg; Pkg.instantiate(); Pkg.add("PyCall"); Pkg.build("PyCall")'
        shell: bash

      - name: Run update script
        run: bin/update_manifest +1.10 --default && bin/update_manifest +1.11 --default

      - name: Create xz files
        run: bin/create_xz_file +1.10 && bin/create_xz_file +1.11

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: update-manifest-${{ github.run_id }}
          base: main
          title: "Update xz files"
          body: "Automated update of default manifest and xz files."
          commit-message: "Update xz files"

